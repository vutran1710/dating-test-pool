name: Process Registration

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.body, '<!-- registration-request -->')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse and commit registration
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          POOL_SALT: ${{ secrets.POOL_SALT }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Extract hex blob from code block (between ``` fences after **Profile Blob:**)
          BLOB_HEX=$(echo "$ISSUE_BODY" | awk '/\*\*Profile Blob:\*\*/{found=1; next} found && /^```/{if(inside){exit}else{inside=1; next}} found && inside{print}' | tr -d '[:space:]')

          if [ -z "$BLOB_HEX" ]; then
            echo "::error::Missing blob in issue body"
            gh issue comment "$ISSUE_NUMBER" --body "Registration rejected: missing profile blob."
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            exit 0
          fi

          if [ -z "$POOL_SALT" ]; then
            echo "::error::POOL_SALT secret not configured"
            exit 1
          fi

          # Compute filename: SHA256(salt:repo:github:author_id)[:16]
          REPO="${{ github.repository }}"
          USER_HASH=$(echo -n "${POOL_SALT}:${REPO}:github:${ISSUE_AUTHOR_ID}" | sha256sum | cut -c1-16)

          # Check if user already registered (update if so)
          if [ -f "users/${USER_HASH}.bin" ]; then
            echo "::notice::User ${USER_HASH} already registered, updating profile"
          fi

          # Convert hex blob to binary and write .bin file
          mkdir -p users
          echo "$BLOB_HEX" | xxd -r -p > "users/${USER_HASH}.bin"

          # Commit and push
          git config user.name "dating-bot"
          git config user.email "bot@dating-pool.dev"
          git add "users/${USER_HASH}.bin"
          git commit -m "Register user ${USER_HASH}"
          git push

      - name: Close issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "$ISSUE_NUMBER" --reason completed
          gh issue comment "$ISSUE_NUMBER" --body "Registration processed successfully."
