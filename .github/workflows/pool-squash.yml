name: Squash History

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  squash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for users
        id: check
        run: |
          if [ ! -d users ] || [ -z "$(ls users/*.bin 2>/dev/null)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No users found — skipping squash"
          fi

      - name: Download action-tool
        if: steps.check.outputs.skip != 'true'
        run: |
          curl -sL https://github.com/vutran1710/openpool/releases/latest/download/action-tool-linux-amd64 -o action-tool
          chmod +x action-tool

      - name: Squash + cleanup stale interests
        if: steps.check.outputs.skip != 'true'
        env:
          MAX_COMMIT_COUNT: ${{ vars.MAX_COMMIT_COUNT || '50' }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: ./action-tool squash
